name: Update USDT Rates

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Fetch USDT from Binance P2P
        run: |
          #!/bin/bash
          
          echo "🔄 Obteniendo tasas USDT de Binance P2P..."
          
          fetch_prices() {
            local TRADE_TYPE=$1
            curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -d "{\"asset\":\"USDT\",\"fiat\":\"VES\",\"merchantCheck\":false,\"page\":1,\"payTypes\":[],\"publisherType\":null,\"rows\":50,\"tradeType\":\"$TRADE_TYPE\"}"
          }
          
          echo "📊 Consultando precios de COMPRA (SELL)..."
          SELL_RESPONSE=$(fetch_prices "SELL")
          BUY_COUNT=$(echo "$SELL_RESPONSE" | jq '.data | length')
          echo "   Anuncios encontrados: $BUY_COUNT"
          BUY_PRICES=$(echo "$SELL_RESPONSE" | jq '[.data[].adv.price | tonumber]')
          AVG_COMPRA=$(echo "$BUY_PRICES" | jq 'if length > 0 then add / length else null end')
          echo "   Promedio COMPRA: $AVG_COMPRA"
          
          echo "📊 Consultando precios de VENTA (BUY)..."
          BUY_RESPONSE=$(fetch_prices "BUY")
          SELL_COUNT=$(echo "$BUY_RESPONSE" | jq '.data | length')
          echo "   Anuncios encontrados: $SELL_COUNT"
          SELL_PRICES=$(echo "$BUY_RESPONSE" | jq '[.data[].adv.price | tonumber]')
          AVG_VENTA=$(echo "$SELL_PRICES" | jq 'if length > 0 then add / length else null end')
          echo "   Promedio VENTA: $AVG_VENTA"
          
          if [ "$AVG_COMPRA" != "null" ] && [ "$AVG_VENTA" != "null" ]; then
            AVG_GENERAL=$(echo "scale=2; ($AVG_COMPRA + $AVG_VENTA) / 2" | bc -l)
          elif [ "$AVG_COMPRA" != "null" ]; then
            AVG_GENERAL=$AVG_COMPRA
            echo "⚠️  Solo se encontraron precios de COMPRA"
          elif [ "$AVG_VENTA" != "null" ]; then
            AVG_GENERAL=$AVG_VENTA
            echo "⚠️  Solo se encontraron precios de VENTA"
          else
            echo "❌ Error: No se pudieron obtener precios de Binance"
            exit 1
          fi
          
          echo "   Promedio GENERAL: $AVG_GENERAL"
          
          DATE_VE=$(TZ=America/Caracas date '+%Y-%m-%d %H:%M:%S')
          DATE_ISO=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          
          cat > usdt_rates.json << JSON
          {
            "compra": $AVG_COMPRA,
            "venta": $AVG_VENTA,
            "promedio": $AVG_GENERAL,
            "lastUpdated": "$DATE_ISO",
            "lastUpdatedVE": "$DATE_VE",
            "fuente": "Binance P2P (50 anuncios verificados)"
          }
          JSON
          
          echo ""
          echo "✅ Tasas actualizadas correctamente:"
          cat usdt_rates.json
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usdt_rates.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update USDT rates - $(TZ=America/Caracas date '+%Y-%m-%d')"
          git push
