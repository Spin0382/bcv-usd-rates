      - name: Fetch USDT from Binance P2P
        run: |
          #!/bin/bash
          
          echo "🔄 Probando con parámetros mínimos..."
          
          # Prueba 1: Solo asset, fiat, tradeType
          echo ""
          echo "📡 Prueba 1: Solo asset, fiat, tradeType"
          curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","tradeType":"SELL"}' | jq '.data | length'
          
          # Prueba 2: Con page y rows
          echo ""
          echo "📡 Prueba 2: asset, fiat, tradeType, page, rows"
          curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","page":1,"rows":20,"tradeType":"SELL"}' | jq '.data | length'
          
          # Prueba 3: Con merchantCheck false
          echo ""
          echo "📡 Prueba 3: asset, fiat, tradeType, page, rows, merchantCheck"
          curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","merchantCheck":false,"page":1,"rows":20,"tradeType":"SELL"}' | jq '.data | length'
          
          # Prueba 4: Con publisherType vacío
          echo ""
          echo "📡 Prueba 4: con publisherType vacío"
          curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","merchantCheck":false,"page":1,"payTypes":[],"publisherType":"","rows":20,"tradeType":"SELL"}' | jq '.data | length'
