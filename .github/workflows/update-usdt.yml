name: Update USDT Rates (Analizador Avanzado)

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora en punto (XX:00)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Fetch and Calculate USDT Metrics
        run: |
          #!/bin/bash
          echo "🔄 Obteniendo datos crudos de Binance P2P (3 páginas)..."
          
          fetch_prices() {
            local TRADE_TYPE=$1
            local PAGE=$2
            curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -d "{\"asset\":\"USDT\",\"fiat\":\"VES\",\"merchantCheck\":true,\"page\":$PAGE,\"payTypes\":[],\"publisherType\":\"\",\"rows\":20,\"tradeType\":\"$TRADE_TYPE\"}"
          }
          
          # Obtener datos crudos
          SELL_P1=$(fetch_prices "SELL" 1); SELL_P2=$(fetch_prices "SELL" 2); SELL_P3=$(fetch_prices "SELL" 3)
          BUY_P1=$(fetch_prices "BUY" 1); BUY_P2=$(fetch_prices "BUY" 2); BUY_P3=$(fetch_prices "BUY" 3)
          
          # Función JQ Maestra: Calcula Simple, Ponderado y Recortado (Trimmed)
          JQ_SCRIPT='
            [.[].data[] | {
              p: (.adv.price | tonumber), 
              q: ((.adv.tradableQuantity // .adv.surplusAmount // "1") | tonumber)
            }] | 
            .[:50] |
            {
              simple: (map(.p) | add / length),
              weighted: ((map(.p * .q) | add) / (map(.q) | add)),
              trimmed: (map(.p) | sort | if length > 10 then .[5:-5] else . end | add / length)
            } | "\(.simple) \(.weighted) \(.trimmed)"
          '
          
          # SELL = Comerciantes comprando (Tasa de Compra de la App)
          METRICS_COMPRA=$(echo "[$SELL_P1, $SELL_P2, $SELL_P3]" | jq -r "$JQ_SCRIPT")
          # BUY = Comerciantes vendiendo (Tasa de Venta de la App)
          METRICS_VENTA=$(echo "[$BUY_P1, $BUY_P2, $BUY_P3]" | jq -r "$JQ_SCRIPT")
          
          # Leer resultados en variables
          read C_SIMPLE C_WEIGHTED C_TRIMMED <<< "$METRICS_COMPRA"
          read V_SIMPLE V_WEIGHTED V_TRIMMED <<< "$METRICS_VENTA"
          
          echo "📊 COMPRA (Usuario vende USDT):"
          echo "   Simple: $C_SIMPLE | Ponderado: $C_WEIGHTED | Recortado: $C_TRIMMED"
          
          echo "📊 VENTA (Usuario compra USDT):"
          echo "   Simple: $V_SIMPLE | Ponderado: $V_WEIGHTED | Recortado: $V_TRIMMED"
          
          # Calcular Promedios Generales
          G_SIMPLE=$(echo "scale=4; ($C_SIMPLE + $V_SIMPLE) / 2" | bc -l)
          G_WEIGHTED=$(echo "scale=4; ($C_WEIGHTED + $V_WEIGHTED) / 2" | bc -l)
          G_TRIMMED=$(echo "scale=4; ($C_TRIMMED + $V_TRIMMED) / 2" | bc -l)
          
          echo "📊 GENERAL:"
          echo "   Simple: $G_SIMPLE | Ponderado: $G_WEIGHTED | Recortado: $G_TRIMMED"
          
          # --- AQUÍ DEBES ELEGIR LA GANADORA ---
          # Por lo general, la "Tasa USDT" que muestra Al Cambio en grande es el VENTA PONDERADO o el GENERAL PONDERADO.
          # Para este commit, usaremos el Ponderado de Venta como ejemplo, pero cámbialo según lo que veas en los logs.
          FINAL_RATE=$(printf "%.2f" $V_WEIGHTED) 
          
          DATE_VE=$(TZ=America/Caracas date '+%Y-%m-%d %H:%M:%S')
          DATE_ISO=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          
          cat > usdt_rates.json << JSON
          {
            "compra": $(printf "%.2f" $C_WEIGHTED),
            "venta": $(printf "%.2f" $V_WEIGHTED),
            "promedio": $(printf "%.2f" $G_WEIGHTED),
            "tasa_principal": $FINAL_RATE,
            "lastUpdated": "$DATE_ISO",
            "lastUpdatedVE": "$DATE_VE",
            "fuente": "Binance P2P (Ponderado 50 anuncios)"
          }
          JSON
          
          cat usdt_rates.json
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usdt_rates.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update USDT rates - $(TZ=America/Caracas date '+%H:%M')"
          git push
