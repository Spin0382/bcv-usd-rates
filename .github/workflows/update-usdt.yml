name: Update USDT Rates

on:
  # 🔔 Escucha las órdenes exactas de cron-job.org
  repository_dispatch:
    types: [actualizar_usdt]
  
  # 🧪 Permite ejecutar manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Log execution time
        run: |
          echo "⏰ Ejecución UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "⏰ Ejecución VE: $(TZ=America/Caracas date '+%Y-%m-%d %H:%M:%S')"
          echo "⏰ Trigger: ${{ github.event_name }}"
        
      - name: Fetch & Calculate VWAP (Python)
        run: |
          python3 << 'PYTHON_EOF'
          import json, urllib.request, datetime, sys

          def fetch_ads(trade_type):
              """Obtiene anuncios de Binance P2P (3 páginas, 20 por página)"""
              url = "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search"
              headers = {
                  "Content-Type": "application/json",
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
              }
              ads = []
              for page in range(1, 4):
                  payload = {
                      "asset": "USDT", "fiat": "VES", "merchantCheck": True,
                      "page": page, "payTypes": [], "publisherType": "",
                      "rows": 20, "tradeType": trade_type
                  }
                  req = urllib.request.Request(url, data=json.dumps(payload).encode("utf-8"), headers=headers)
                  try:
                      with urllib.request.urlopen(req, timeout=15) as res:
                          data = json.loads(res.read())
                          for item in data.get("data", []):
                              price = float(item["adv"]["price"])
                              qty = float(item["adv"].get("tradableQuantity") or item["adv"].get("surplusAmount") or 1)
                              ads.append({"price": price, "qty": qty})
                  except Exception as e:
                      print(f"⚠️ Error en página {page} ({trade_type}): {e}", file=sys.stderr)
              return ads[:50]

          def calculate_vwap(ads):
              """Calcula el Precio Promedio Ponderado por Volumen (VWAP)"""
              if not ads: return 0.0
              total_value = sum(a["price"] * a["qty"] for a in ads)
              total_qty = sum(a["qty"] for a in ads)
              return round(total_value / total_qty, 2) if total_qty > 0 else 0.0

          print("🔄 Consultando Binance P2P...")
          venta_ads = fetch_ads("BUY")
          compra_ads = fetch_ads("SELL")

          tasa_venta = calculate_vwap(venta_ads)
          tasa_compra = calculate_vwap(compra_ads)
          
          if tasa_venta == 0 or tasa_compra == 0:
              print("❌ Error crítico: No se pudieron calcular tasas válidas. Abortando commit.")
              sys.exit(1)

          tasa_promedio = round((tasa_compra + tasa_venta) / 2, 2)

          now_ve = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=-4)))
          now_utc = datetime.datetime.now(datetime.timezone.utc)

          output = {
              "compra": tasa_compra,
              "venta": tasa_venta,
              "promedio": tasa_promedio,
              "tasa_principal": tasa_venta,
              "lastUpdated": now_utc.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "lastUpdatedVE": now_ve.strftime("%Y-%m-%d %H:%M:%S"),
              "fuente": "Binance P2P (VWAP 50 anuncios verificados)"
          }

          with open("usdt_rates.json", "w", encoding="utf-8") as f:
              json.dump(output, f, indent=2)

          print("✅ Tasas calculadas y guardadas:")
          print(json.dumps(output, indent=2))
          PYTHON_EOF

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usdt_rates.json
          git diff --staged --quiet || git commit -m "📊 Update USDT rate - $(TZ=America/Caracas date '+%H:%M VE')"
          git push
