name: Update USDT Rates

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Debug Binance API
        run: |
          #!/bin/bash
          
          echo "🔄 Probando conexión a Binance P2P..."
          echo ""
          
          # Probar con curl mostrando headers
          echo "═══════════════════════════════════════════════════"
          echo "📡 Headers de respuesta:"
          echo "═══════════════════════════════════════════════════"
          curl -s -i -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","merchantCheck":false,"page":1,"payTypes":[],"publisherType":null,"rows":50,"tradeType":"SELL"}' \
            | head -30
          
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "📡 Tipo de contenido recibido:"
          echo "═══════════════════════════════════════════════════"
          curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","merchantCheck":false,"page":1,"payTypes":[],"publisherType":null,"rows":50,"tradeType":"SELL"}' \
            | file -
          
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "📡 Guardando respuesta completa en archivo:"
          echo "═══════════════════════════════════════════════════"
          curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d '{"asset":"USDT","fiat":"VES","merchantCheck":false,"page":1,"payTypes":[],"publisherType":null,"rows":50,"tradeType":"SELL"}' \
            > response.txt
          
          echo "Primeros 1000 caracteres de la respuesta:"
          head -c 1000 response.txt
          echo ""
          echo ""
          
          # Subir el archivo como artifact para inspeccionarlo
      - name: Upload response for debugging
        uses: actions/upload-artifact@v4
        with:
          name: binance-response
          path: response.txt
