name: Update USDT Rates

on:
  schedule:
    - cron: '0 14 * * *'  # 10:00 AM Venezuela (14:00 UTC)
    - cron: '0 23 * * *'  # 7:00 PM Venezuela (23:00 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Fetch USDT from Binance P2P (50 anuncios)
        run: |
          #!/bin/bash
          
          echo "🔄 Obteniendo tasas USDT de Binance P2P (50 anuncios)..."
          
          fetch_prices() {
            local TRADE_TYPE=$1
            local PAGE=$2
            curl -s -X POST "https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -d "{\"asset\":\"USDT\",\"fiat\":\"VES\",\"merchantCheck\":true,\"page\":$PAGE,\"payTypes\":[],\"publisherType\":\"\",\"rows\":20,\"tradeType\":\"$TRADE_TYPE\"}"
          }
          
          echo "📊 Consultando precios de COMPRA (SELL) - 3 páginas..."
          SELL_P1=$(fetch_prices "SELL" 1)
          SELL_P2=$(fetch_prices "SELL" 2)
          SELL_P3=$(fetch_prices "SELL" 3)
          
          AVG_COMPRA=$(echo "[$SELL_P1, $SELL_P2, $SELL_P3]" | jq -r '
            [.[].data[].adv.price | tonumber] | 
            .[:50] | 
            add / length
          ')
          echo "   Promedio COMPRA (50 anuncios): $AVG_COMPRA"
          
          echo "📊 Consultando precios de VENTA (BUY) - 3 páginas..."
          BUY_P1=$(fetch_prices "BUY" 1)
          BUY_P2=$(fetch_prices "BUY" 2)
          BUY_P3=$(fetch_prices "BUY" 3)
          
          AVG_VENTA=$(echo "[$BUY_P1, $BUY_P2, $BUY_P3]" | jq -r '
            [.[].data[].adv.price | tonumber] | 
            .[:50] | 
            add / length
          ')
          echo "   Promedio VENTA (50 anuncios): $AVG_VENTA"
          
          if [ "$AVG_COMPRA" != "null" ] && [ "$AVG_VENTA" != "null" ]; then
            AVG_GENERAL=$(echo "scale=4; ($AVG_COMPRA + $AVG_VENTA) / 2" | bc -l)
            COMPRA_FMT=$(printf "%.2f" $AVG_COMPRA)
            VENTA_FMT=$(printf "%.2f" $AVG_VENTA)
            PROMEDIO_FMT=$(printf "%.2f" $AVG_GENERAL)
          else
            echo "❌ Error: No se pudieron obtener precios válidos."
            exit 1
          fi
          
          echo "   Promedio GENERAL: $PROMEDIO_FMT"
          
          DATE_VE=$(TZ=America/Caracas date '+%Y-%m-%d %H:%M:%S')
          DATE_ISO=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          
          cat > usdt_rates.json << JSON
          {
            "compra": $COMPRA_FMT,
            "venta": $VENTA_FMT,
            "promedio": $PROMEDIO_FMT,
            "lastUpdated": "$DATE_ISO",
            "lastUpdatedVE": "$DATE_VE",
            "fuente": "Binance P2P (promedio 50 anuncios verificados)"
          }
          JSON
          
          echo ""
          echo "✅ Tasas actualizadas correctamente:"
          cat usdt_rates.json
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add usdt_rates.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update USDT rates (50 anuncios) - $(TZ=America/Caracas date '+%Y-%m-%d %H:%M')"
          git push
